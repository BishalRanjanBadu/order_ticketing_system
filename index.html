<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Rail — Cake Order &amp; Production System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#211C18;
    --bg-panel:#2A231D;
    --bg-panel-2:#332B23;
    --paper:#F6EFDF;
    --paper-shadow:#e8ddc4;
    --ink:#2B241F;
    --ink-soft:#6b5f52;
    --chalk:#F3ECDC;
    --chalk-dim:#c9bda6;
    --line:rgba(243,236,220,0.12);
    --line-soft:rgba(43,36,31,0.12);
    --accent-butter:#E8B94A;
    --accent-rose:#D9738F;
    --accent-mint:#7FAF8B;
    --accent-cocoa:#9C6B43;
    --accent-orange:#DD8A45;
    --accent-red:#C0574C;
    --accent-plum:#8A6FA8;
    --radius:3px;
    --font-display:'Fraunces',serif;
    --font-body:'Inter',sans-serif;
    --font-mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--chalk);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  ::selection{background:var(--accent-butter);color:var(--ink);}
  a{color:inherit;}
  button{font-family:var(--font-body);cursor:pointer;}
  input,select,textarea{font-family:var(--font-body);}
  h1,h2,h3,h4{font-family:var(--font-display);margin:0;font-weight:600;}
  .mono{font-family:var(--font-mono);}

  .btn{
    display:inline-flex;align-items:center;gap:.5em;
    padding:.62em 1.1em;border-radius:var(--radius);border:1px solid transparent;
    font-size:.86rem;font-weight:600;letter-spacing:.01em;
    transition:transform .12s ease, background .15s ease, opacity .15s ease;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--accent-butter);color:#241c0f;}
  .btn-primary:hover{background:#f0c866;}
  .btn-ghost{background:transparent;color:var(--chalk);border-color:var(--line);}
  .btn-ghost:hover{background:var(--bg-panel-2);}
  .btn-danger{background:transparent;color:var(--accent-red);border-color:rgba(192,87,76,.4);}
  .btn-danger:hover{background:rgba(192,87,76,.12);}
  .btn-plum{background:var(--accent-plum);color:#fff;}
  .btn-plum:hover{opacity:.9;}
  .btn-sm{padding:.4em .8em;font-size:.76rem;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-block{width:100%;justify-content:center;}

  input[type=text],input[type=tel],input[type=number],input[type=date],
  input[type=time],input[type=email],input[type=password],select,textarea{
    background:var(--bg-panel-2);border:1px solid var(--line);color:var(--chalk);
    padding:.62em .75em;border-radius:var(--radius);font-size:.88rem;width:100%;
  }
  input::placeholder,textarea::placeholder{color:var(--chalk-dim);}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--accent-butter);outline-offset:1px;}
  label{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--chalk-dim);display:block;margin-bottom:.35em;}
  .field{margin-bottom:1rem;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:.85rem;}
  .field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.85rem;}

  .center-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
  .panel{
    background:var(--bg-panel);border:1px solid var(--line);border-radius:6px;
    padding:2.2rem;width:100%;max-width:420px;
  }
  .panel-eyebrow{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--accent-butter);margin-bottom:.5rem;}
  .panel h1{font-size:1.5rem;margin-bottom:.3rem;}
  .panel .sub{color:var(--chalk-dim);font-size:.86rem;margin-bottom:1.6rem;line-height:1.5;}
  .helptext{font-size:.76rem;color:var(--chalk-dim);line-height:1.5;margin-top:1.2rem;}
  .helptext a{color:var(--accent-butter);text-decoration:underline;}
  .error-msg{background:rgba(192,87,76,.14);border:1px solid rgba(192,87,76,.4);color:#f0b3ac;
    padding:.6em .8em;border-radius:var(--radius);font-size:.8rem;margin-bottom:1rem;}

  .google-btn{
    display:flex;align-items:center;justify-content:center;gap:.7rem;width:100%;
    background:#fff;color:#3c4043;border:1px solid #dadce0;border-radius:6px;
    padding:.75em 1rem;font-size:.9rem;font-weight:600;
  }
  .google-btn:hover{background:#f8f8f8;}

  .status-hero{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    margin-bottom:1.2rem;font-size:1.6rem;background:var(--bg-panel-2);}

  .shell{display:grid;grid-template-columns:220px 1fr;min-height:100vh;}
  .sidebar{background:var(--bg-panel);border-right:1px solid var(--line);padding:1.4rem 1rem;display:flex;flex-direction:column;}
  .brand{display:flex;align-items:center;gap:.6rem;padding:0 .4rem;margin-bottom:2rem;}
  .brand-mark{width:26px;height:26px;flex:none;}
  .brand-text{font-family:var(--font-display);font-size:1.05rem;font-weight:600;line-height:1.1;}
  .brand-text small{display:block;font-family:var(--font-body);font-size:.62rem;color:var(--chalk-dim);
    text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-top:2px;}
  .nav{display:flex;flex-direction:column;gap:.2rem;flex:1;}
  .nav-item{
    display:flex;align-items:center;gap:.65rem;padding:.62em .7em;border-radius:var(--radius);
    background:none;border:none;color:var(--chalk-dim);font-size:.85rem;font-weight:500;text-align:left;width:100%;
  }
  .nav-item:hover{background:var(--bg-panel-2);color:var(--chalk);}
  .nav-item.active{background:var(--bg-panel-2);color:var(--accent-butter);}
  .nav-item svg{width:16px;height:16px;flex:none;}
  .nav-item .pill-count{margin-left:auto;background:var(--accent-rose);color:#fff;border-radius:20px;
    font-size:.66rem;font-weight:700;padding:.05em .5em;}
  .sidebar-foot{border-top:1px solid var(--line);padding-top:1rem;margin-top:1rem;}
  .who{font-size:.8rem;font-weight:600;}
  .who-role{font-size:.7rem;color:var(--chalk-dim);text-transform:capitalize;}

  .content{padding:2rem 2.4rem;max-width:1280px;}
  .content-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:1.6rem;gap:1rem;flex-wrap:wrap;}
  .content-head h2{font-size:1.5rem;}
  .content-head .sub{color:var(--chalk-dim);font-size:.84rem;margin-top:.2rem;}

  .filterbar{display:flex;gap:.6rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:1.4rem;
    background:var(--bg-panel);border:1px solid var(--line);border-radius:6px;padding:1rem;}
  .filterbar .field{margin-bottom:0;min-width:150px;flex:1;}
  .filterbar .field.grow-2{flex:2;}

  .rail{background:var(--paper);border-radius:6px;padding:1.4rem;}
  .ticket{
    position:relative;background:#fff;color:var(--ink);border-radius:2px;
    padding:1rem 1.2rem 1rem 1.2rem;margin-bottom:.9rem;
    box-shadow:0 1px 0 var(--paper-shadow), 0 8px 16px -12px rgba(0,0,0,.35);
    display:flex;gap:1rem;align-items:center;cursor:pointer;
    border-left:4px solid var(--accent-cocoa);
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .ticket:hover{transform:translateX(2px);box-shadow:0 1px 0 var(--paper-shadow), 0 10px 20px -10px rgba(0,0,0,.4);}
  .ticket.status-new{border-color:var(--accent-cocoa);}
  .ticket.status-confirmed{border-color:var(--accent-butter);}
  .ticket.status-baking{border-color:var(--accent-orange);}
  .ticket.status-ready{border-color:var(--accent-mint);}
  .ticket.status-delivered{border-color:#9fb3a8;opacity:.72;}
  .ticket.status-cancelled{border-color:var(--accent-red);opacity:.55;}
  .ticket.priority{box-shadow:0 0 0 1.5px var(--accent-rose), 0 8px 16px -12px rgba(0,0,0,.35);}

  .ticket-main{flex:1;min-width:0;}
  .ticket-title{font-weight:700;font-size:.95rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
  .ticket-meta{font-size:.78rem;color:var(--ink-soft);margin-top:.15rem;}
  .ticket-shop{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);font-weight:600;}
  .ticket-right{display:flex;align-items:center;gap:1rem;flex:none;}
  .ticket-amount{font-family:var(--font-mono);font-size:.85rem;font-weight:600;}
  .ticket-status-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;font-weight:700;color:var(--ink-soft);}

  .empty-state{padding:3rem 1rem;text-align:center;color:var(--ink-soft);}
  .empty-state h3{color:var(--ink);margin-bottom:.4rem;font-size:1.05rem;}

  .tier-icon{flex:none;}

  .tag{display:inline-flex;align-items:center;gap:.25em;padding:.15em .55em;border-radius:20px;font-size:.62rem;
    font-weight:800;text-transform:uppercase;letter-spacing:.04em;}
  .tag-rush{background:#fbe4ea;color:#a13d5e;}
  .tag-custom{background:#ece3f5;color:#5c4585;}
  .tag-approval{background:#fde6d3;color:#9a5417;}

  .badge{display:inline-block;padding:.2em .6em;border-radius:20px;font-size:.68rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.04em;}
  .badge-new{background:#efe2cf;color:#7a5836;}
  .badge-confirmed{background:#faeac0;color:#8a6a17;}
  .badge-baking{background:#f9dcbd;color:#9a5417;}
  .badge-ready{background:#dcefdf;color:#33714a;}
  .badge-delivered{background:#e6e9e6;color:#5c665f;}
  .badge-cancelled{background:#f4dcd8;color:#a13d31;}
  .badge-active{background:#dcefdf;color:#33714a;}
  .badge-pending{background:#fde6d3;color:#9a5417;}
  .badge-suspended{background:#f4dcd8;color:#a13d31;}
  .badge-removed{background:#e6e9e6;color:#5c665f;}

  .modal-backdrop{position:fixed;inset:0;background:rgba(15,12,10,.72);display:flex;
    align-items:flex-start;justify-content:center;padding:3rem 1.2rem;overflow-y:auto;z-index:50;}
  .modal{background:var(--bg-panel);border:1px solid var(--line);border-radius:8px;width:100%;
    max-width:680px;padding:1.8rem;}
  .modal-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.2rem;gap:1rem;}
  .modal-close{background:none;border:none;color:var(--chalk-dim);font-size:1.3rem;line-height:1;padding:.2rem;}
  .modal-close:hover{color:var(--chalk);}
  .tabs{display:flex;gap:1.4rem;border-bottom:1px solid var(--line);margin-bottom:1.2rem;}
  .tab{background:none;border:none;color:var(--chalk-dim);padding:.5rem 0;font-size:.84rem;font-weight:600;
    border-bottom:2px solid transparent;}
  .tab.active{color:var(--accent-butter);border-color:var(--accent-butter);}

  .history-item{padding:.7rem 0;border-bottom:1px solid var(--line);font-size:.82rem;}
  .history-item:last-child{border-bottom:none;}
  .history-meta{color:var(--chalk-dim);font-size:.72rem;margin-top:.15rem;}

  .status-track{display:flex;gap:.4rem;margin:1rem 0;flex-wrap:wrap;}
  .status-pill{padding:.4em .85em;border-radius:20px;font-size:.76rem;font-weight:600;border:1px solid var(--line);
    background:var(--bg-panel-2);color:var(--chalk-dim);}
  .status-pill.current{background:var(--accent-butter);color:#241c0f;border-color:var(--accent-butter);}
  .status-pill.clickable{cursor:pointer;}
  .status-pill.clickable:hover{border-color:var(--accent-butter);color:var(--chalk);}

  .locked-note{background:rgba(217,115,143,.12);border:1px solid rgba(217,115,143,.35);color:#e6a9bb;
    padding:.6em .8em;border-radius:var(--radius);font-size:.78rem;margin-bottom:1rem;}
  .approval-note{background:rgba(221,138,69,.14);border:1px solid rgba(221,138,69,.4);color:#f0c496;
    padding:.7em .9em;border-radius:var(--radius);font-size:.82rem;margin-bottom:1rem;display:flex;
    justify-content:space-between;align-items:center;gap:.8rem;flex-wrap:wrap;}

  .board{display:grid;grid-template-columns:repeat(5,1fr);gap:.9rem;align-items:start;}
  .board-col{background:var(--bg-panel);border:1px solid var(--line);border-radius:8px;padding:.8rem;min-height:200px;}
  .board-col-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.7rem;padding:0 .2rem;}
  .board-col-head h4{font-size:.82rem;text-transform:uppercase;letter-spacing:.05em;}
  .board-count{font-family:var(--font-mono);font-size:.72rem;color:var(--chalk-dim);}
  .board-card{background:var(--paper);color:var(--ink);border-radius:4px;padding:.65rem .75rem;margin-bottom:.6rem;
    font-size:.8rem;cursor:pointer;}
  .board-card:hover{outline:2px solid var(--accent-butter);}
  .board-card .bc-title{font-weight:700;margin-bottom:.15rem;display:flex;gap:.3rem;flex-wrap:wrap;align-items:center;}
  .board-card .bc-meta{color:var(--ink-soft);font-size:.72rem;}
  .board-card.priority{outline:2px solid var(--accent-rose);}
  .board-empty{color:var(--chalk-dim);font-size:.76rem;text-align:center;padding:1.4rem .4rem;}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.9rem;margin-bottom:1.6rem;}
  .stat-card{background:var(--bg-panel);border:1px solid var(--line);border-radius:8px;padding:1.1rem 1.2rem;}
  .stat-card .num{font-family:var(--font-display);font-size:1.9rem;font-weight:600;}
  .stat-card .lbl{font-size:.72rem;color:var(--chalk-dim);text-transform:uppercase;letter-spacing:.05em;margin-top:.3rem;}
  .chart-card{background:var(--bg-panel);border:1px solid var(--line);border-radius:8px;padding:1.3rem;margin-bottom:1.2rem;}
  .chart-card h3{font-size:.9rem;margin-bottom:1rem;}
  .bar-row{display:flex;align-items:center;gap:.7rem;margin-bottom:.55rem;}
  .bar-label{font-size:.72rem;color:var(--chalk-dim);width:88px;flex:none;font-family:var(--font-mono);}
  .bar-track{flex:1;background:var(--bg-panel-2);border-radius:3px;height:16px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--accent-butter);border-radius:3px;}
  .bar-val{font-size:.72rem;color:var(--chalk-dim);width:70px;text-align:right;font-family:var(--font-mono);}

  table{width:100%;border-collapse:collapse;background:var(--bg-panel);border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  th,td{text-align:left;padding:.75em .9em;font-size:.83rem;border-bottom:1px solid var(--line);vertical-align:middle;}
  th{color:var(--chalk-dim);text-transform:uppercase;font-size:.68rem;letter-spacing:.05em;font-weight:600;}
  tr:last-child td{border-bottom:none;}
  select.inline-select{width:auto;padding:.4em .6em;font-size:.78rem;}
  input.inline-num{width:90px;padding:.4em .5em;font-size:.8rem;}

  .toast{position:fixed;bottom:1.4rem;right:1.4rem;background:var(--bg-panel);border:1px solid var(--line);
    border-left:4px solid var(--accent-mint);color:var(--chalk);padding:.8em 1.1em;border-radius:6px;
    font-size:.84rem;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.4);max-width:320px;}
  .toast.error{border-left-color:var(--accent-red);}

  .loading-row{color:var(--chalk-dim);font-size:.85rem;padding:2rem;text-align:center;}

  /* --- catalog / order-builder --- */
  .mode-toggle{display:flex;gap:.6rem;margin-bottom:1.4rem;}
  .mode-btn{flex:1;padding:.8em;border-radius:6px;border:1px solid var(--line);background:var(--bg-panel-2);
    color:var(--chalk-dim);font-weight:600;font-size:.85rem;text-align:center;}
  .mode-btn.active{border-color:var(--accent-butter);color:var(--accent-butter);background:rgba(232,185,74,.08);}

  .cat-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem;}
  .cat-tab{padding:.5em 1em;border-radius:20px;border:1px solid var(--line);background:var(--bg-panel-2);
    color:var(--chalk-dim);font-size:.8rem;font-weight:600;}
  .cat-tab.active{background:var(--accent-butter);color:#241c0f;border-color:var(--accent-butter);}

  .item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.7rem;margin-bottom:1.2rem;}
  .item-card{background:var(--bg-panel-2);border:1px solid var(--line);border-radius:6px;padding:.8rem;cursor:pointer;}
  .item-card:hover{border-color:var(--accent-butter);}
  .item-card.selected{border-color:var(--accent-butter);background:rgba(232,185,74,.1);}
  .item-card .ic-name{font-weight:700;font-size:.85rem;margin-bottom:.3rem;}
  .item-card .ic-price{font-size:.74rem;color:var(--chalk-dim);font-family:var(--font-mono);}

  .photo-row{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.6rem;}
  .photo-thumb{position:relative;width:76px;height:76px;border-radius:6px;overflow:hidden;border:1px solid var(--line);}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo-thumb .rm{position:absolute;top:2px;right:2px;background:rgba(0,0,0,.65);color:#fff;border:none;
    border-radius:50%;width:18px;height:18px;font-size:.7rem;line-height:1;}
  .upload-box{border:1.5px dashed var(--line);border-radius:6px;padding:1rem;text-align:center;color:var(--chalk-dim);font-size:.8rem;}
  .upload-box input{display:none;}
  .upload-box label{cursor:pointer;color:var(--accent-butter);font-weight:600;text-transform:none;font-size:.82rem;}

  @media (max-width:900px){
    .shell{grid-template-columns:1fr;}
    .sidebar{position:sticky;top:0;flex-direction:row;overflow-x:auto;z-index:10;padding:.8rem;}
    .brand{margin-bottom:0;}
    .nav{flex-direction:row;}
    .sidebar-foot{display:none;}
    .content{padding:1.2rem;}
    .board{grid-template-columns:1fr;}
    .field-row,.field-row3{grid-template-columns:1fr;}
    .stat-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>

<div id="root"></div>

<script>
/* ============================================================================
   STATE
============================================================================ */
const App = {
  sb: null,
  session: null,
  profile: null,
  shops: [],
  profiles: [],
  orders: [],
  ordersLoaded: false,
  catalog: [],           // categories with nested .items
  catalogLoaded: false,
  settings: {},
  view: 'orders',
  filters: { shop: '', status: '', from: '', to: '', q: '' },
  orderForm: { mode:'catalog', categoryId:null, itemId:null, weight:1, photos:[] }, // photos: [{file, blob, url}]
  activityTimer: null,
};

const STATUS_FLOW = ['new','confirmed','baking','ready','delivered'];
const STATUS_LABEL = {new:'New', confirmed:'Confirmed', baking:'Baking', ready:'Ready', delivered:'Delivered', cancelled:'Cancelled'};
const PHOTO_BUCKET = 'cake-references';
const MAX_PHOTOS = 5;

/* ============================================================================
   BOOT
============================================================================ */
function boot(){
  const cfg = getConfig();
  if(!cfg){ renderConfigScreen(); return; }
  App.sb = supabase.createClient(cfg.url, cfg.key);
  App.sb.auth.onAuthStateChange((event, session)=>{
    App.session = session;
    if(session){ afterLogin(); } else { App.profile = null; stopActivityTimer(); renderAuthScreen(); }
  });
  App.sb.auth.getSession().then(({data})=>{
    App.session = data.session;
    if(App.session){ afterLogin(); } else { renderAuthScreen(); }
  });
}
function getConfig(){
  try{ 
    const stored = JSON.parse(localStorage.getItem('bakery_supabase_config'));
    if(stored) return stored;
  }catch(e){}
  // Fallback to hardcoded credentials for production deployment
  return {
    url: 'https://mhagyxhqslwggcfhppau.supabase.co',
    key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oYWd5eGhxc2x3Z2djZmhwcGF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxODgxODEsImV4cCI6MjA5OTc2NDE4MX0.o20YehL1AjyzKOty7g24bB5reHjbi_UCx3uHt6ivVMA'
  };
}
function saveConfig(url,key){ localStorage.setItem('bakery_supabase_config', JSON.stringify({url,key})); }

/* ============================================================================
   SCREEN: SUPABASE CONFIG (first run)
============================================================================ */
function renderConfigScreen(){
  root.innerHTML = `
  <div class="center-screen">
    <div class="panel">
      <div class="panel-eyebrow">Setup — one time only</div>
      <h1>Connect your Supabase project</h1>
      <div class="sub">Paste the Project URL and anon public key from your Supabase project. They're saved only in this browser.</div>
      <div id="cfg-error"></div>
      <div class="field"><label>Project URL</label><input type="text" id="cfg-url" placeholder="https://xxxxxxxx.supabase.co"></div>
      <div class="field"><label>Anon public key</label><input type="text" id="cfg-key" placeholder="eyJhbGciOi..."></div>
      <button class="btn btn-primary btn-block" id="cfg-save">Connect</button>
      <div class="helptext">

async function afterLogin(){
  root.innerHTML = `<div class="center-screen"><div class="loading-row">Loading your bakery…</div></div>`;
  let profile = await fetchMyProfile();
  let tries = 0;
  while(!profile && tries < 6){ await sleep(500); profile = await fetchMyProfile(); tries++; }
  if(!profile){
    root.innerHTML = `<div class="center-screen"><div class="panel"><h1>Almost there</h1>
      <div class="sub">We couldn't find your profile yet. Refresh the page in a moment.</div>
      <button class="btn btn-ghost btn-block" onclick="location.reload()">Refresh</button></div></div>`;
    return;
  }
  App.profile = profile;
  App.sb.from('profiles').update({ last_active: new Date().toISOString() }).eq('id', profile.id).then(()=>{});

  if(profile.status !== 'active'){ renderBlockedScreen(profile.status); return; }

  await Promise.all([loadShops(), loadProfiles(), loadCatalog(), loadSettings()]);
  App.view = (App.profile.role === 'baker') ? 'factory' : 'orders';
  renderShell();
  startActivityTimer();
}
async function fetchMyProfile(){
  const { data, error } = await App.sb.from('profiles').select('*').eq('id', App.session.user.id).maybeSingle();
  if(error){ console.error(error); return null; }
  return data;
}
function renderBlockedScreen(status){
  const copy = {
    pending: {icon:'⏳', title:'Waiting for approval', body:"You're signed in, but an Owner needs to activate your account and assign your role before you can use the system. Check back soon, or ask your Owner to open Manage Team."},
    suspended: {icon:'⏸', title:'Account suspended', body:'Your access has been suspended by the Owner. Contact them if you think this is a mistake.'},
    removed: {icon:'✕', title:'Account removed', body:'Your access to this system has been removed by the Owner.'},
  }[status] || {icon:'⏳', title:'Access unavailable', body:'Please contact your Owner.'};
  root.innerHTML = `
  <div class="center-screen"><div class="panel">
    <div class="status-hero">${copy.icon}</div>
    <h1>${copy.title}</h1>
    <div class="sub">${copy.body}</div>
    <button class="btn btn-ghost btn-block" id="blocked-refresh">Check again</button>
    <button class="btn btn-danger btn-block" style="margin-top:.6rem;" id="blocked-signout">Sign out</button>
  </div></div>`;
  document.getElementById('blocked-refresh').onclick = ()=> afterLogin();
  document.getElementById('blocked-signout').onclick = async ()=> App.sb.auth.signOut();
}

/* poll own status periodically so a suspend/remove takes effect without
   waiting for the JWT to expire — RLS already blocks data access instantly,
   this just makes the UI reflect it and sign the person out */
function startActivityTimer(){
  stopActivityTimer();
  App.activityTimer = setInterval(async ()=>{
    const p = await fetchMyProfile();
    if(!p || p.status !== 'active'){ await App.sb.auth.signOut(); }
  }, 45000);
}
function stopActivityTimer(){ if(App.activityTimer){ clearInterval(App.activityTimer); App.activityTimer=null; } }

async function loadProfiles(){ const { data, error } = await App.sb.from('profiles').select('*').order('full_name'); if(!error) App.profiles = data||[]; }

async function loadCatalog(){

/* ============================================================================

============================================================================ */
function applyFilters(list){
  const f = App.filters;
  return list.filter(o=>{
    if(f.shop && o.shop_id !== f.shop) return false;
    if(f.status && o.status !== f.status) return false;
    if(f.from && o.delivery_date < f.from) return false;
    if(f.to && o.delivery_date > f.to) return false;
    if(f.q){
      const q = f.q.toLowerCase();
      if(!(o.customer_name.toLowerCase().includes(q) || (o.customer_phone||'').includes(q) || (o.cake_type||'').toLowerCase().includes(q) || (o.catalog_item_snapshot||'').toLowerCase().includes(q))) return false;
    }
    return true;
  });
}
function renderOrdersView(){
  const content = document.getElementById('content');
  const filtered = applyFilters(App.orders).slice().sort((a,b)=> a.delivery_date.localeCompare(b.delivery_date));
  content.innerHTML = `
    <div class="content-head"><div><h2>Orders</h2><div class="sub">${filtered.length} of ${App.orders.length} order${App.orders.length===1?'':'s'}</div></div></div>
    ${filterBarHtml(true)}
    <div class="rail" id="rail"></div>`;
  wireFilterBar(renderOrdersView);
  const rail = document.getElementById('rail');
  if(filtered.length === 0){ rail.innerHTML = emptyState('No orders here yet', 'Orders matching these filters will line up on this rail.'); return; }
  rail.innerHTML = filtered.map(o=>ticketHtml(o)).join('');
  rail.querySelectorAll('.ticket').forEach(t=>{ t.onclick = ()=> openOrderModal(t.dataset.id); });
}
function filterBarHtml(withSearch){
  const f = App.filters;
  return `
  <div class="filterbar">
    ${withSearch ? `<div class="field grow-2"><label>Search</label><input type="text" id="f-q" placeholder="Customer, phone, cake…" value="${escapeAttr(f.q)}"></div>` : ''}
    <div class="field"><label>Shop</label><select id="f-shop"><option value="">All shops</option>${App.shops.map(s=>`<option value="${s.id}" ${f.shop===s.id?'selected':''}>${escapeHtml(s.name)}</option>`).join('')}</select></div>
    <div class="field"><label>Status</label><select id="f-status"><option value="">All statuses</option>${['new','confirmed','baking','ready','delivered','cancelled'].map(s=>`<option value="${s}" ${f.status===s?'selected':''}>${STATUS_LABEL[s]}</option>`).join('')}</select></div>
    <div class="field"><label>Delivery from</label><input type="date" id="f-from" value="${f.from}"></div>
    <div class="field"><label>Delivery to</label><input type="date" id="f-to" value="${f.to}"></div>
    <button class="btn btn-ghost" id="f-clear">Clear</button>
  </div>`;
}
function wireFilterBar(rerender){
  const q = document.getElementById('f-q');
  if(q) q.oninput = ()=>{ App.filters.q = q.value; rerender(); };
  document.getElementById('f-shop').onchange = e=>{ App.filters.shop = e.target.value; rerender(); };
  document.getElementById('f-status').onchange = e=>{ App.filters.status = e.target.value; rerender(); };
  document.getElementById('f-from').onchange = e=>{ App.filters.from = e.target.value; rerender(); };
  document.getElementById('f-to').onchange = e=>{ App.filters.to = e.target.value; rerender(); };
  document.getElementById('f-clear').onclick = ()=>{ App.filters = {shop:'',status:'',from:'',to:'',q:''}; rerender(); };
}
function ticketHtml(o){
  const amt = Number(o.amount||0).toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2});
  const itemLabel = o.order_kind === 'custom' ? 'Custom cake' : (o.catalog_item_snapshot || o.cake_type || 'Cake');
  return `
  <div class="ticket status-${o.status} ${o.is_priority ? 'priority':''}" data-id="${o.id}">
    ${tierIcon(o.status, 46)}
    <div class="ticket-main">
      <div class="ticket-title">${escapeHtml(o.customer_name)}
        ${o.is_priority ? '<span class="tag tag-rush">Rush</span>' : ''}
        ${o.order_kind==='custom' ? '<span class="tag tag-custom">Custom</span>' : ''}
        ${o.approval_status==='pending' ? '<span class="tag tag-approval">Needs approval</span>' : ''}
      </div>
      <div class="ticket-meta">${escapeHtml(itemLabel)} · ${o.weight_kg}kg — delivery ${formatDate(o.delivery_date)}${o.delivery_time ? ' at ' + formatTime(o.delivery_time) : ''}</div>
      <div class="ticket-shop">${escapeHtml(shopName(o.shop_id))} <span class="mono" style="text-transform:none;color:var(--ink-soft);">· #${o.id.slice(0,8)}</span></div>
    </div>
    <div class="ticket-right"><div><div class="ticket-amount">₹${amt}</div><div class="ticket-status-label">${STATUS_LABEL[o.status]}</div></div></div>
  </div>`;
}
function tierIcon(status, size){
  size = size || 40;
  const idx = STATUS_FLOW.indexOf(status);
  const cancelled = status === 'cancelled';
  const colors = ['#c9bda6','#e8b94a','#dd8a45','#7faf8b','#5c8a6b'];
  const h = 34;
  let rects = '', y = h - 2;
  const tierHeights = [7,6.5,6,5.5,5];
  for(let i=0;i<5;i++){
    const filled = !cancelled && i <= idx;
    const th = tierHeights[i]; y -= th;
    const tw = 32 - i*4.4; const x = (32-tw)/2;
    rects += `<rect x="${x}" y="${y}" width="${tw}" height="${th}" rx="1" fill="${filled?colors[i]:'transparent'}" stroke="${filled?colors[i]:'#d8cdb6'}" stroke-width="1.1"/>`;
  }
  const strike = cancelled ? `<line x1="2" y1="32" x2="30" y2="4" stroke="#c0574c" stroke-width="2"/>` : '';
  return `<svg class="tier-icon" width="${size*0.75}" height="${size*0.8}" viewBox="0 0 32 34" xmlns="http://www.w3.org/2000/svg">${rects}${strike}</svg>`;
}
function emptyState(title, sub){ return `<div class="empty-state"><h3>${escapeHtml(title)}</h3><div>${escapeHtml(sub)}</div></div>`; }

/* ============================================================================
   ORDER DETAIL MODAL
============================================================================ */
let modalTab = 'details';
async function openOrderModal(id){
  const order = App.orders.find(o=>o.id===id);
  if(!order) return;
  modalTab = 'details';
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop'; backdrop.id = 'modal-backdrop';
  document.body.appendChild(backdrop);
  const history = await loadHistory(id);
  const photoUrls = order.reference_photos && order.reference_photos.length ? await signedUrls(order.reference_photos) : [];
  drawOrderModal(order, history, photoUrls);
  backdrop.onclick = (e)=>{ if(e.target === backdrop) closeModal(); };
}
function closeModal(){ const b = document.getElementById('modal-backdrop'); if(b) b.remove(); }
async function signedUrls(paths){
  const out = [];
  for(const p of paths){
    const { data } = await App.sb.storage.from(PHOTO_BUCKET).createSignedUrl(p, 3600);
    if(data) out.push(data.signedUrl);
  }
  return out;
}
function canEditDetails(order){
  const role = App.profile.role;
  if(role === 'owner' || role === 'manager') return true;
  if(role === 'shop_staff') return order.shop_id === App.profile.shop_id && ['new','confirmed'].includes(order.status);
  return false;
}
function canChangeStatusTo(order, newStatus){
  const role = App.profile.role;
  if(newStatus === 'baking' && order.approval_status === 'pending') return false;
  if(role === 'owner' || role === 'manager') return true;
  if(role === 'baker') return true;
  if(role === 'shop_staff') return order.shop_id === App.profile.shop_id && ['new','confirmed','cancelled'].includes(newStatus);
  return false;
}
function canDelete(){ return App.profile.role === 'owner'; }
function canApprove(){ return ['owner','manager'].includes(App.profile.role); }

function drawOrderModal(order, history, photoUrls){
  const backdrop = document.getElementById('modal-backdrop');
  const editable = canEditDetails(order);
  backdrop.innerHTML = `
  <div class="modal">
    <div class="modal-head">
      <div>
        <div class="panel-eyebrow mono">#${order.id.slice(0,8)} · ${escapeHtml(shopName(order.shop_id))} ${order.order_kind==='custom'?' · <span style="color:var(--accent-plum);">CUSTOM</span>':''}</div>
        <h2>${escapeHtml(order.customer_name)}</h2>
      </div>
      <button class="modal-close" id="m-close">×</button>
    </div>

    ${order.order_kind==='custom' && order.approval_status!=='not_required' ? `
      <div class="approval-note">
        <span>${order.approval_status==='pending' ? `Custom order of ₹${Number(order.amount).toLocaleString()} needs Owner/Manager approval before it can go into production.`

        ${order.approval_status==='pending' && canApprove() ? `<span style="display:flex;gap:.5rem;"><button class="btn btn-sm btn-primary" id="m-approve">Approve</button><button class="btn btn-sm btn-danger" id="m-reject">Reject</button></span>` : ''}
      </div>` : ''}

    <div class="status-track">
      ${STATUS_FLOW.map(s=>{
        const clickable = canChangeStatusTo(order, s) && s !== order.status;
        return `<button class="status-pill ${order.status===s?'current':''} ${clickable?'clickable':''}" ${clickable?`data-status="${s}"`:'disabled'} title="${(s==='baking'&&order.approval_status==='pending')?'Needs approval first':''}">${STATUS_LABEL[s]}</button>`;
      }).join('')}
      ${canChangeStatusTo(order,'cancelled') && order.status!=='cancelled' ? `<button class="status-pill clickable" data-status="cancelled">Cancel</button>` : ''}
      ${order.status==='cancelled' ? `<span class="status-pill current" style="background:var(--accent-red);border-color:var(--accent-red);">Cancelled</span>` : ''}
    </div>

    <div class="tabs">
      <button class="tab ${modalTab==='details'?'active':''}" data-tab="details">Details</button>

    <div style="display:flex;justify-content:space-between;margin-top:1.4rem;">
      <div>${canDelete() ? `<button class="btn btn-danger btn-sm" id="m-delete">Delete order</button>` : '<span></span>'}</div>
      <div style="display:flex;gap:.6rem;">
        <button class="btn btn-ghost" id="m-close2">Close</button>
        ${editable ? `<button class="btn btn-primary" id="m-save">Save changes</button>` : ''}
      </div>
    </div>
  </div>`;

  drawModalTabBody(order, history, editable, photoUrls);
  document.getElementById('m-close').onclick = closeModal;
  document.getElementById('m-close2').onclick = closeModal;
  backdrop.querySelectorAll('.tab').forEach(t=>{ t.onclick = ()=>{ modalTab = t.dataset.tab; drawOrderModal(order, history, photoUrls); }; });
  backdrop.querySelectorAll('.status-pill.clickable').forEach(p=>{
    p.onclick = async ()=>{
      const { error } = await App.sb.from('orders').update({status:p.dataset.status}).eq('id', order.id);
      if(error){ toast(error.message, true); return; }
      toast(`Order moved to ${STATUS_LABEL[p.dataset.status]}`); closeModal(); await loadOrders(); renderView();
    };
  });
  const appr = document.getElementById('m-approve');
  if(appr) appr.onclick = async ()=>{
    const { error } = await App.sb.from('orders').update({approval_status:'approved'}).eq('id', order.id);
    if(error){ toast(error.message, true); return; }
    toast('Order approved'); closeModal(); await loadOrders(); renderView();
  };
  const rej = document.getElementById('m-reject');
  if(rej) rej.onclick = async ()=>{
    if(!confirm('Reject this custom order?')) return;
    const { error } = await App.sb.from('orders').update({approval_status:'rejected'}).eq('id', order.id);
    if(error){ toast(error.message, true); return; }
    toast('Order rejected'); closeModal(); await loadOrders(); renderView();
  };
  const delBtn = document.getElementById('m-delete');
  if(delBtn) delBtn.onclick = async ()=>{
    if(!confirm('Delete this order permanently? This cannot be undone.')) return;
    const { error } = await App.sb.from('orders').delete().eq('id', order.id);
    if(error){ toast(error.message, true); return; }
    toast('Order deleted'); closeModal(); await loadOrders(); renderView();
  };
  const saveBtn = document.getElementById('m-save');
  if(saveBtn) saveBtn.onclick = async ()=>{
    const patch = collectOrderForm();
    if(!patch) return;
    const { error } = await App.sb.from('orders').update(patch).eq('id', order.id);
    if(error){ toast(error.message, true); return; }
    toast('Order updated'); closeModal(); await loadOrders(); renderView();
  };
}

function drawModalTabBody(order, history, editable, photoUrls){
  const body = document.getElementById('modal-tab-body');
  if(modalTab === 'history'){
    body.innerHTML = history.length ? history.map(h=>`
      <div class="history-item"><div>${historyLine(h)}</div>

function suggestPrice(item, weight){
  weight = Number(weight)||0;
  if(Math.abs(weight-0.5) < 0.001) return item.price_half_kg;
  return Math.round(item.price_full_kg * weight);
}

async function onPhotosSelected(e){
  const files = Array.from(e.target.files || []);
  const room = MAX_PHOTOS - App.orderForm.photos.length;
  if(files.length > room) toast(`Only ${room} more photo(s) can be added (max ${MAX_PHOTOS})`, true);
  for(const file of files.slice(0, room)){
    try{
      const blob = await compressImage(file, 1600, 0.75);
      const url = URL.createObjectURL(blob);
      App.orderForm.photos.push({ blob, url, name: file.name });
    }catch(err){ toast('Could not process ' + file.name, true); }
  }
  e.target.value = '';
  renderPhotoRow();
}

/* resize + re-encode as JPEG on a canvas to keep Supabase's 1GB free storage tier lean */
function compressImage(file, maxDim, quality){
  return new Promise((resolve, reject)=>{
    const img = new Image();
    const reader = new FileReader();
    reader.onload = ()=>{ img.onload = ()=>{
      let {width, height} = img;
      if(width > maxDim || height > maxDim){
        const scale = maxDim / Math.max(width, height);
        width = Math.round(width*scale); height = Math.round(height*scale);
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('compress failed')), 'image/jpeg', quality);
    }; img.onerror = reject; img.src = reader.result; };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function uuid(){
  if(crypto.randomUUID) return crypto.randomUUID();
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c=>{ const r=Math.random()*16|0, v=c==='x'?r:(r&0x3|0x8); return v.toString(16); });
}

async function submitNewOrder(){
  const f = App.orderForm;
  const name = document.getElementById('n-name').value.trim();
  const date = document.getElementById('n-date').value;
  if(!name || !date){ toast('Customer name and delivery date are required', true); return; }
  const shopLocked = App.profile.role === 'shop_staff';
  const shopId = shopLocked ? App.profile.shop_id : document.getElementById('n-shop').value;
  const weight = parseFloat(document.getElementById('n-weight').value || '1');
  const amount = parseFloat(document.getElementById('n-amount').value || '0');
  const btn = document.getElementById('n-submit');

  let payload = {
    shop_id: shopId,
    customer_name: name,
    customer_phone: document.getElementById('n-phone').value.trim(),
    message_on_cake: document.getElementById('n-message').value.trim(),
    delivery_date: date,
    delivery_time: document.getElementById('n-time').value || null,
    weight_kg: weight,
    amount: amount,
    is_priority: document.getElementById('n-priority').checked,
    created_by: App.profile.id,
  };

  if(f.mode === 'catalog'){
    const item = catalogItemById(f.itemId);
    if(!item){ toast('Pick a catalog item first', true); return; }
    const cat = App.catalog.find(c=>c.id===item.category_id);
    payload = { ...payload, order_kind:'catalog', catalog_item_id:item.id,
      catalog_category_snapshot: cat?cat.name:'', catalog_item_snapshot: item.name,
      cake_type: item.name, design_notes:'' };
    const { error } = await App.sb.from('orders').insert(payload);
    if(error){ toast(error.message, true); return; }
    toast('Order added'); await loadOrders(); App.view='orders'; renderShell();
  }else{
    if(!amount){ toast('Enter a quoted price for the custom order', true); return; }
    btn.disabled = true; btn.textContent = 'Uploading photos…';
    try{
      const paths = [];
      const folder = uuid();
      for(let i=0;i<f.photos.length;i++){
        const path = `custom/${folder}/${i}.jpg`;
        const { error: upErr } = await App.sb.storage.from(PHOTO_BUCKET).upload(path, f.photos[i].blob, { contentType:'image/jpeg' });
        if(upErr) throw upErr;
        paths.push(path);
      }
      payload = { ...payload, order_kind:'custom',
        cake_type: document.getElementById('n-ctype').value.trim(),
        design_notes: document.getElementById('n-notes').value.trim(),
        reference_photos: paths };
      const { error } = await App.sb.from('orders').insert(payload);
      if(error) throw error;
      toast('Custom order added'); await loadOrders(); App.view='orders'; renderShell();
    }catch(err){
      toast(err.message || 'Could not save custom order', true);
      btn.disabled = false; btn.textContent = 'Add order to rail';
    }
  }
}

function groupSum(list, keyFn){ const m=new Map(); list.forEach(o=>{ const k=keyFn(o); m.set(k,(m.get(k)||0)+Number(o.amount||0)); }); return m; }
function groupCount(list, keyFn){ const m=new Map(); list.forEach(o=>{ const k=keyFn(o); m.set(k,(m.get(k)||0)+1); }); return m; }
function barChart(map, fmt, isCount, sortOrder){
  let entries = Array.from(map.entries());
  if(sortOrder) entries.sort((a,b)=> sortOrder.indexOf(a[0]) - sortOrder.indexOf(b[0]));
  else entries.sort((a,b)=> a[0] < b[0] ? -1 : 1);
  if(entries.length === 0) return `<div class="board-empty">No data yet</div>`;
  const max = Math.max(...entries.map(e=>e[1]), 1);
  return entries.map(([k,v])=>`<div class="bar-row"><div class="bar-label">${escapeHtml(String(k))}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.max(3,(v/max)*100)}%"></div></div>
    <div class="bar-val">${fmt(v)}</div></div>`).join('');
}

function presetRange(v){
  const now = new Date(); const y = now.getFullYear();
  const pad = n=>String(n).padStart(2,'0');
  const iso = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  if(v==='week'){ const day=now.getDay()||7; const monday=new Date(now); monday.setDate(now.getDate()-day+1); const sunday=new Date(monday); sunday.setDate(monday.getDate()+6); return {from:iso(monday),to:iso(sunday)}; }
  if(v==='month'){ return {from:`${y}-${pad(now.getMonth()+1)}-01`, to: iso(new Date(y, now.getMonth()+1, 0))}; }
  if(v==='year') return {from:`${y}-01-01`, to:`${y}-12-31`};
  const qMap = {q1:[0,2], q2:[3,5], q3:[6,8], q4:[9,11]};
  if(qMap[v]){ const [sm,em]=qMap[v]; return {from:`${y}-${pad(sm+1)}-01`, to: iso(new Date(y, em+1, 0))}; }
  return {from:'',to:''};
}
function filteredExportRows(){
  const shop = document.getElementById('e-shop').value;
  const status = document.getElementById('e-status').value;
  const kind = document.getElementById('e-kind').value;
  const from = document.getElementById('e-from').value;
  const to = document.getElementById('e-to').value;
  return App.orders.filter(o=>{
    if(shop && o.shop_id !== shop) return false;
    if(status && o.status !== status) return false;
    if(kind && o.order_kind !== kind) return false;
    if(from && o.delivery_date < from) return false;
    if(to && o.delivery_date > to) return false;
    return true;
  });
}
function doExport(kind){
  const rows = filteredExportRows();
  if(rows.length === 0){ toast('No orders match this filter', true); return; }
  const data = rows.map(o=>({
    'Order ID': o.id, 'Shop': shopName(o.shop_id), 'Customer': o.customer_name, 'Order Type': o.order_kind==='custom'?'Custom':'Catalog',
    'Item': o.order_kind==='custom' ? (o.cake_type||'Custom cake') : o.catalog_item_snapshot,
    'Weight (kg)': o.weight_kg, 'Design Notes': o.design_notes, 'Message on Cake': o.message_on_cake,
    'Order Date': o.order_date, 'Delivery Date': o.delivery_date, 'Status': STATUS_LABEL[o.status]||o.status,
    'Approval': o.approval_status, 'Amount': Number(o.amount||0),
  }));
  const shopVal = document.getElementById('e-shop').value;
  const shopLabel = shopVal ? shopName(shopVal).replace(/\s+/g,'') : 'AllShops';
  const from = document.getElementById('e-from').value, to = document.getElementById('e-to').value;
  const period = (from||to) ? `${from||'start'}_to_${to||'end'}` : 'AllDates';
  const filename = `${shopLabel}_OrderReport_${period}`;
  if(kind === 'csv'){
    const headers = Object.keys(data[0]);
    const csv = [headers.join(',')].concat(data.map(r=> headers.map(h=> csvEscape(r[h])).join(','))).join('\n');
    downloadBlob(new Blob([csv], {type:'text/csv;charset=utf-8;'}), filename + '.csv');
  }else{
    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Orders');
    const totalAmt = data.reduce((s,r)=>s+r.Amount,0);
    const summary = [{Metric:'Total orders', Value:data.length},{Metric:'Total amount', Value:totalAmt},{Metric:'Average order value', Value:data.length?Math.round(totalAmt/data.length):0}];
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(summary), 'Summary');
    XLSX.writeFile(wb, filename + '.xlsx');
  }
  toast('Export ready — check your downloads');
}
function csvEscape(v){ const s=String(v??''); return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s; }
function downloadBlob(blob, filename){ const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }

/* ============================================================================
   HELPERS
============================================================================ */
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }
function formatDate(iso){ if(!iso) return '—'; const d = new Date(iso+'T00:00:00'); return d.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'}); }
function formatTime(t){ if(!t) return ''; const [h,m] = t.split(':'); const d = new Date(); d.setHours(+h,+m); return d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'}); }
function formatDateTime(ts){ if(!ts) return '—'; const d = new Date(ts); return d.toLocaleString(undefined,{day:'numeric',month:'short',hour:'numeric',minute:'2-digit'}); }

let toastTimer;
function toast(msg, isError){
  let el = document.getElementById('toast'); if(el) el.remove();
  el = document.createElement('div'); el.id = 'toast'; el.className = 'toast' + (isError ? ' error' : ''); el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(toastTimer); toastTimer = setTimeout(()=> el.remove(), 3800);
}
